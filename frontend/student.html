<!DOCTYPE html>
<html>
<head>
    <title>SHACC Student Dashboard</title>

    <!-- Mobile responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --background: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --subtext: #64748b;
            --border: #e2e8f0;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: var(--background);
            color: var(--text);
        }

        .container {
            max-width: 480px;
            margin: auto;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            font-size: 20px;
            font-weight: 600;
        }

        .logout {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
        }

        /* Input */
        input {
            box-sizing: border-box;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-top: 8px;
            font-size: 14px;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text);
        }

        /* Attendance list */
        ul {
            padding-left: 16px;
            margin-top: 10px;
        }

        li {
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--subtext);
        }

        /* Info */
        .info {
            font-size: 13px;
            color: var(--subtext);
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <div class="title">🥋 SHACC</div>
        <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="info" id="welcome"></div>

    <!-- Record -->
    <div class="card">
        <h3>Record Attendance</h3>
        <input type="text" id="notes" placeholder="Add notes (optional)">
        <button class="btn btn-primary" onclick="recordAttendance()">Record</button>
    </div>

    <!-- Attendance -->
    <div class="card">
        <h3>Your Attendance</h3>
        <div style="margin-top:10px;">
            <label>From:</label>
            <input type="date" id="dateFrom">
        
            <label>To:</label>
            <input type="date" id="dateTo">
        </div>
        <button class="btn btn-secondary" onclick="viewAttendance()">Apply Filter</button><button class="btn btn-secondary" onclick="viewAttendance()">Refresh</button>
        <p><strong>Total:</strong> <span id="total">0</span></p>
        <ul id="attendanceList"></ul>
    </div>

</div>

<script>
const BASE_URL = "http://127.0.0.1:8000";

// get user
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}

// welcome text
document.getElementById("welcome").textContent =
    "Student ID: " + user.student_id;


// logout
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}


// record attendance
async function recordAttendance() {
    const notes = document.getElementById("notes").value;

    await fetch(
        `${BASE_URL}/attendance?student_id=${user.student_id}&notes=${notes}`,
        { method: "POST" }
    );

    alert("Attendance recorded");
}


// view attendance
async function viewAttendance() {
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;

    let url = `${BASE_URL}/attendance/${user.student_id}?`;

    if (from) url += `date_from=${from}&`;
    if (to) url += `date_to=${to}&`;

    const response = await fetch(url);
    const data = await response.json();

    const list = document.getElementById("attendanceList");
    list.innerHTML = "";

    document.getElementById("total").textContent = data.length;

    data.forEach(record => {
        const item = document.createElement("li");
        item.textContent = `${record.session_date} • ${record.notes || "No notes"}`;
        list.appendChild(item);
    });
}
</script>

</body>
</html>
